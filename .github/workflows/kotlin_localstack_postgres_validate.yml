name: validate template for kotlin with localstack and postgres
on:
  workflow_call:
    inputs:
      working_directory:
        type: string
        required: false
        default: '~/app'
      java_version:
        type: string
        required: false
        default: '21'
      java_options:
        type: string
        default: 'default: -Xmx512m -XX:ParallelGCThreads=2 -XX:ConcGCThreads=2 -Djava.util.concurrent.ForkJoinPool.common.parallelism=2 -Dorg.gradle.daemon=false -Dkotlin.compiler.execution.strategy=in-process -Dorg.gradle.workers.max=1'
        required: false
      postgres_tag:
        type: string
        required: true
      postgres_password:
        type: string
        default: 'dev'
        required: false
      postgres_username:
        type: string
        default: 'root'
        required: true
      postgres_db:
        type: string
        default: 'postgres'
        required: false
      services:
        type: string
        default: 's3,sqs,sns,es,ec2,lambda'
        required: false
      localstack_tag:
        type: string
        default: 'latest'
        required: false
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    # Label used to access the service container
    services:
      postgres:
        # Docker Hub PostgreSQL image
        image: postgres:${{ inputs.postgres_tag }}
        # Provide the password for postgres
        env:
          POSTGRES_USER: ${{ inputs.postgres_username }}
          POSTGRES_PASSWORD: ${{ inputs.postgres_password }}
          POSTGRES_DB: ${{ inputs.postgres_db}}
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          # Maps tcp port 5432 on service container to the host
          - 5432:5432
      localstack:
        image: localstack/localstack:${{ inputs.localstack_tag }}
        ports:
          - 4566:4566
          - 4571:4571
        env:
          ES_PORT_EXTERNAL: 4571
          DOCKER_HOST: 'unix:///var/run/docker.sock'
          AWS_EXECUTION_ENV: True
          PERSISTENCE: 1
          SERVICES: "${{ inputs.services }}"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: refresh cache
        id: initial-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        env:
          cache-name: kotlin-cache
        with:
          path: |
            - gradle-{{ checksum "build.gradle.kts" }}
            - gradle-
          key: ${{ runner.os }}-gradle-${{ env.cache-name }}-${{ hashFiles('build.gradle.kts') }}
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '${{ inputs.java_version }}'
          cache: 'gradle'
          cache-dependency-path: |
            *.gradle*
            **/gradle-wrapper.properties
      ## INSERT COMMANDS HERE
      - name: upload the artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: upload kotlin valdation results
          path: |
            build/test-results
            build/reports/tests
